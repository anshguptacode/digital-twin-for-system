apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-twin-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: your-registry/digital-twin-backend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: digital-twin-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000
